</main>

<script>
  function toggle(el) {
    const li = el.closest('li');
    const wasOpen = li.classList.contains('open');
    document.querySelectorAll('.nav-index > li').forEach(l => {
      l.classList.remove('open');
      const link = l.querySelector('.nav-section-link');
      if (link) link.classList.remove('active');
    });
    if (!wasOpen) {
      li.classList.add('open');
      el.classList.add('active');
    }
  }

  // Robust scroll-spy: highlight the section/subsection whose top is closest
  // to (but above) 20% of the viewport. Falls back to the first target when
  // scrolled back to the top.
  const targets = Array.from(document.querySelectorAll('.report-section, .sub-head'));
  const navLinks = Array.from(document.querySelectorAll('.nav-section-link, .nav-sub a'));
  const sectionItems = Array.from(document.querySelectorAll('.nav-index > li'));

  function activeTarget() {
    const threshold = window.innerHeight * 0.2;
    let best = null;
    for (const target of targets) {
      const top = target.getBoundingClientRect().top;
      if (top <= threshold && (!best || top > best.top)) {
        best = { target, top };
      }
    }
    return best ? best.target : targets[0] || null;
  }

  function updateNav() {
    const target = activeTarget();
    navLinks.forEach(a => a.classList.remove('active'));
    sectionItems.forEach(li => li.classList.remove('open'));

    if (!target) return;
    const id = target.id;
    const link = document.querySelector(`.nav-section-link[href="#${id}"], .nav-sub a[href="#${id}"]`);
    if (!link) return;

    link.classList.add('active');
    const li = link.closest('.nav-index > li');
    if (li) li.classList.add('open');

    // Also highlight the parent section link when a subsection is active.
    if (target.classList.contains('sub-head')) {
      const sectionLink = li && li.querySelector('.nav-section-link');
      if (sectionLink) sectionLink.classList.add('active');
    }
  }

  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      window.requestAnimationFrame(() => { updateNav(); ticking = false; });
      ticking = true;
    }
  }, { passive: true });
  updateNav();

  // Client-side table pagination and sorting
  function getTableRows(table) {
    return Array.from(table.querySelectorAll('tbody tr'));
  }

  function updatePager(pager, page) {
    const tableId = pager.dataset.table;
    const table = document.getElementById(tableId);
    if (!table) return;
    const pageSize = parseInt(pager.dataset.pageSize, 10) || 25;
    const rows = getTableRows(table);
    const totalPages = Math.max(1, Math.ceil(rows.length / pageSize));
    page = Math.max(1, Math.min(page, totalPages));
    pager.dataset.currentPage = String(page);
    pager.dataset.totalPages = String(totalPages);
    rows.forEach((row, idx) => {
      row.style.display = (idx >= (page - 1) * pageSize && idx < page * pageSize) ? '' : 'none';
    });
    pager.querySelector('.table-pager-info').textContent = `Page ${page} of ${totalPages}`;
    pager.querySelector('.table-pager-prev').disabled = page === 1;
    pager.querySelector('.table-pager-next').disabled = page === totalPages;
  }

  document.querySelectorAll('.table-pager').forEach(pager => {
    pager.querySelector('.table-pager-prev').addEventListener('click', () => {
      const current = parseInt(pager.dataset.currentPage, 10) || 1;
      updatePager(pager, current - 1);
    });
    pager.querySelector('.table-pager-next').addEventListener('click', () => {
      const current = parseInt(pager.dataset.currentPage, 10) || 1;
      updatePager(pager, current + 1);
    });
    updatePager(pager, 1);
  });

  // Sortable tables: click numeric headers to sort; works with pagination.
  document.querySelectorAll('table[data-sortable="true"]').forEach(table => {
    const tbody = table.querySelector('tbody');
    if (!tbody) return;

    table.querySelectorAll('thead th[data-sortable="numeric"]').forEach(th => {
      th.title = 'Click to sort';
      th.addEventListener('click', () => {
        const col = th.cellIndex;
        const currentDir = th.dataset.sortDir;
        const newDir = currentDir === 'asc' ? 'desc' : 'asc';

        table.querySelectorAll('thead th').forEach(h => delete h.dataset.sortDir);
        th.dataset.sortDir = newDir;

        const rows = getTableRows(table);
        rows.sort((a, b) => {
          const ac = a.children[col];
          const bc = b.children[col];
          if (!ac || !bc) return 0;
          const av = parseFloat(ac.dataset.sortValue || ac.textContent);
          const bv = parseFloat(bc.dataset.sortValue || bc.textContent);
          if (Number.isNaN(av) || Number.isNaN(bv)) return 0;
          return newDir === 'asc' ? av - bv : bv - av;
        });
        rows.forEach(row => tbody.appendChild(row));

        const pager = document.getElementById(table.id + '-pager');
        if (pager) updatePager(pager, 1);
      });
    });
  });
</script>
