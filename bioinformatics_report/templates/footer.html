</main>

<script>
  function toggle(el) {
    const li = el.closest('li');
    const wasOpen = li.classList.contains('open');
    document.querySelectorAll('.nav-index > li').forEach(l => {
      l.classList.remove('open');
      const link = l.querySelector('.nav-section-link');
      if (link) link.classList.remove('active');
    });
    if (!wasOpen) {
      li.classList.add('open');
      el.classList.add('active');
    }
  }

  // Robust scroll-spy: highlight the section/subsection whose top is closest
  // to (but above) 20% of the viewport. Falls back to the first target when
  // scrolled back to the top.
  const targets = Array.from(document.querySelectorAll('.report-section, .sub-head'));
  const navLinks = Array.from(document.querySelectorAll('.nav-section-link, .nav-sub a'));
  const sectionItems = Array.from(document.querySelectorAll('.nav-index > li'));

  function activeTarget() {
    const threshold = window.innerHeight * 0.2;
    let best = null;
    for (const target of targets) {
      const top = target.getBoundingClientRect().top;
      if (top <= threshold && (!best || top > best.top)) {
        best = { target, top };
      }
    }
    return best ? best.target : targets[0] || null;
  }

  function updateNav() {
    const target = activeTarget();
    navLinks.forEach(a => a.classList.remove('active'));
    sectionItems.forEach(li => li.classList.remove('open'));

    if (!target) return;
    const id = target.id;
    const link = document.querySelector(`.nav-section-link[href="#${id}"], .nav-sub a[href="#${id}"]`);
    if (!link) return;

    link.classList.add('active');
    const li = link.closest('.nav-index > li');
    if (li) li.classList.add('open');

    // Also highlight the parent section link when a subsection is active.
    if (target.classList.contains('sub-head')) {
      const sectionLink = li && li.querySelector('.nav-section-link');
      if (sectionLink) sectionLink.classList.add('active');
    }
  }

  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      window.requestAnimationFrame(() => { updateNav(); ticking = false; });
      ticking = true;
    }
  }, { passive: true });
  updateNav();

  // Client-side table pagination
  document.querySelectorAll('.table-pager').forEach(pager => {
    const tableId = pager.dataset.table;
    const pageSize = parseInt(pager.dataset.pageSize, 10) || 25;
    const table = document.getElementById(tableId);
    if (!table) return;
    const rows = Array.from(table.querySelectorAll('tbody tr'));
    const totalPages = Math.max(1, Math.ceil(rows.length / pageSize));
    let currentPage = 1;

    function showPage(page) {
      currentPage = page;
      rows.forEach((row, idx) => {
        row.style.display = (idx >= (currentPage - 1) * pageSize && idx < currentPage * pageSize) ? '' : 'none';
      });
      pager.querySelector('.table-pager-info').textContent = `Page ${currentPage} of ${totalPages}`;
      pager.querySelector('.table-pager-prev').disabled = currentPage === 1;
      pager.querySelector('.table-pager-next').disabled = currentPage === totalPages;
    }

    pager.querySelector('.table-pager-prev').addEventListener('click', () => {
      if (currentPage > 1) showPage(currentPage - 1);
    });
    pager.querySelector('.table-pager-next').addEventListener('click', () => {
      if (currentPage < totalPages) showPage(currentPage + 1);
    });

    showPage(1);
  });
</script>
