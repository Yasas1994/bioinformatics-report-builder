name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.6.43"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"

      - name: Lint with ruff
        run: |
          ruff check bioinformatics_report tests
          ruff format --check bioinformatics_report tests

      - name: Type check with mypy
        run: mypy bioinformatics_report

      - name: Run tests
        run: pytest --cov=bioinformatics_report --cov-report=xml

      - name: Render example reports
        run: |
          cd examples
          python metagenomics_report.py
          python single_cell_report.py
          python spatial_transcriptomics_report.py
          python multi_omics_report.py
          python generic_company_report.py
          for f in out/*/*.qmd; do quarto render "$f" --to html; done

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
